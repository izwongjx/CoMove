<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - Rewards Management</title>
  <link rel="stylesheet" href="../../public-assets/css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <nav class="top-nav admin-nav-bg">
    <div class="nav-inner">
      <a href="../../../index.html" class="logo">ECO<span class="text-lime">RIDE</span> <span
          class="admin-badge">Admin</span></a>
      <div class="nav-items">
        <a href="dashboard.html" class="nav-item"><span data-icon="layout-dashboard" data-icon-size="16"></span>
          Overview</a>
        <a href="users.html" class="nav-item"><span data-icon="users" data-icon-size="16"></span> Users</a>
        <a href="rewards.html" class="nav-item active"><span data-icon="gift" data-icon-size="16"></span> Rewards</a>
        <a href="logs.html" class="nav-item"><span data-icon="activity" data-icon-size="16"></span> Logs</a>
        <a href="analytics.html" class="nav-item"><span data-icon="bar-chart" data-icon-size="16"></span> Analytics</a>
        <a href="settings.html" class="nav-item"><span data-icon="settings" data-icon-size="16"></span> Settings</a>
        <a href="profile.html" class="nav-item"><span data-icon="user" data-icon-size="16"></span> Profile</a>
      </div>
      <a href="../../../index.html" class="nav-logout"><span data-icon="log-out" data-icon-size="20"></span></a>
    </div>
  </nav>
  <main class="dashboard-main">
    <div class="dash-container">
      <div class="flex justify-between items-center flex-wrap gap-4 mb-6">
        <div>
          <h1 class="page-title">Rewards Management</h1>
          <p class="page-subtitle">Manage reward catalog and inventory</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('rewardModal')"><span data-icon="plus"
            data-icon-size="18"></span> Add New Reward</button>
      </div>
      <div class="admin-stats-grid" style="margin-bottom:24px;" id="rewardStats"></div>
      <div class="rewards-admin-grid" id="adminRewardsGrid"></div>
    </div>
  </main>
  <nav class="bottom-nav admin-bottom-nav">
    <a href="dashboard.html"><span data-icon="layout-dashboard" data-icon-size="24"></span></a>
    <a href="users.html"><span data-icon="users" data-icon-size="24"></span></a>
    <a href="rewards.html" class="active"><span data-icon="gift" data-icon-size="24"></span></a>
    <a href="logs.html"><span data-icon="activity" data-icon-size="24"></span></a>
    <a href="analytics.html"><span data-icon="bar-chart" data-icon-size="24"></span></a>
    <a href="settings.html"><span data-icon="settings" data-icon-size="24"></span></a>
    <a href="profile.html"><span data-icon="user" data-icon-size="24"></span></a>
  </nav>
  <div class="modal-overlay" id="rewardModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="font-bold text-lg">Add New Reward</h3><button class="modal-close"
          data-close-modal="rewardModal"><span data-icon="x" data-icon-size="20"></span></button>
      </div>
      <div class="modal-body">
        <form id="rewardForm">
          <div class="form-group"><label class="form-label">Reward Name</label><input type="text" class="form-input"
              name="name" required></div>
          <div class="form-group"><label class="form-label">Points Required</label><input type="number"
              class="form-input" name="points" required></div>
          <div class="form-group"><label class="form-label">Category</label><input type="text" class="form-input"
              name="category" required></div>
          <div class="form-group"><label class="form-label">Stock</label><input type="number" class="form-input"
              name="stock" required></div>
          <div class="form-group"><label class="form-label">Description</label><input type="text" class="form-input"
              name="description"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Save Reward</button>
        </form>
      </div>
    </div>
  </div>
  <script src="../../public-assets/js/script.js"></script>
  <script src="admin.js"></script>
</body>

</html>
