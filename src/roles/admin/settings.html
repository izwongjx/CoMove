<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - Settings</title>
  <link rel="stylesheet" href="../../public-assets/css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <nav class="top-nav admin-nav-bg">
    <div class="nav-inner">
      <a href="../../../index.html" class="logo">ECO<span class="text-lime">RIDE</span> <span
          class="admin-badge">Admin</span></a>
      <div class="nav-items">
        <a href="dashboard.html" class="nav-item"><span data-icon="layout-dashboard" data-icon-size="16"></span>
          Overview</a>
        <a href="users.html" class="nav-item"><span data-icon="users" data-icon-size="16"></span> Users</a>
        <a href="rewards.html" class="nav-item"><span data-icon="gift" data-icon-size="16"></span> Rewards</a>
        <a href="logs.html" class="nav-item"><span data-icon="activity" data-icon-size="16"></span> Logs</a>
        <a href="analytics.html" class="nav-item"><span data-icon="bar-chart" data-icon-size="16"></span> Analytics</a>
        <a href="settings.html" class="nav-item active"><span data-icon="settings" data-icon-size="16"></span>
          Settings</a>
        <a href="profile.html" class="nav-item"><span data-icon="user" data-icon-size="16"></span> Profile</a>
      </div>
      <a href="../../../index.html" class="nav-logout"><span data-icon="log-out" data-icon-size="20"></span></a>
    </div>
  </nav>
  <main class="dashboard-main">
    <div class="dash-container">
      <h1 class="page-title">System Settings</h1>
      <p class="page-subtitle">Configure platform rules and parameters</p>
      <div class="grid md-grid-2 gap-6">
        <div>
          <div class="multiplier-card" id="multiplierCard"></div>
          <div class="card p-6">
            <h3 class="font-bold mb-4 uppercase flex items-center gap-2"><span data-icon="shield" data-icon-size="18"
                style="color:var(--gray-400);"></span> Security Settings</h3>
            <div class="notif-row">
              <div>
                <div class="font-bold text-sm">Require Email Verification</div>
                <div class="text-xs text-gray-500">For new signups</div>
              </div>
              <div class="toggle active">
                <div class="toggle-knob"></div>
              </div>
            </div>
            <div class="notif-row">
              <div>
                <div class="font-bold text-sm">Manual Driver Approval</div>
                <div class="text-xs text-gray-500">Review all docs</div>
              </div>
              <div class="toggle active">
                <div class="toggle-knob"></div>
              </div>
            </div>
          </div>
        </div>
        <div>
          <div class="card p-6">
            <div id="pointRulesForm"></div>
          </div>
          <div class="calc-preview" id="calcPreview"></div>
        </div>
      </div>
    </div>
  </main>
  <nav class="bottom-nav admin-bottom-nav">
    <a href="dashboard.html"><span data-icon="layout-dashboard" data-icon-size="24"></span></a>
    <a href="users.html"><span data-icon="users" data-icon-size="24"></span></a>

    <a href="analytics.html"><span data-icon="bar-chart" data-icon-size="24"></span></a>
    <a href="settings.html" class="active"><span data-icon="settings" data-icon-size="24"></span></a>
    <a href="profile.html"><span data-icon="user" data-icon-size="24"></span></a>
  </nav>
  <script src="../../public-assets/js/script.js"></script>
  <script src="admin.js"></script>
</body>

</html>
