<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - Admin Dashboard</title>
  <link rel="stylesheet" href="../../public-assets/css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <nav class="top-nav admin-nav-bg">
    <div class="nav-inner">
      <a href="../../../index.html" class="logo">ECO<span class="text-lime">RIDE</span> <span
          class="admin-badge">Admin</span></a>
      <div class="nav-items">
        <a href="dashboard.html" class="nav-item active"><span data-icon="layout-dashboard" data-icon-size="16"></span>
          Overview</a>
        <a href="users.html" class="nav-item"><span data-icon="users" data-icon-size="16"></span> Users</a>
        <a href="rewards.html" class="nav-item"><span data-icon="gift" data-icon-size="16"></span> Rewards</a>
        <a href="logs.html" class="nav-item"><span data-icon="activity" data-icon-size="16"></span> Logs</a>
        <a href="analytics.html" class="nav-item"><span data-icon="bar-chart" data-icon-size="16"></span> Analytics</a>
        <a href="settings.html" class="nav-item"><span data-icon="settings" data-icon-size="16"></span> Settings</a>
        <a href="profile.html" class="nav-item"><span data-icon="user" data-icon-size="16"></span> Profile</a>
      </div>
      <a href="../../../index.html" class="nav-logout"><span data-icon="log-out" data-icon-size="20"></span></a>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="dash-container">
      <h1 class="page-title">Dashboard Overview</h1>
      <p class="page-subtitle">Welcome back, Admin</p>
      <div class="admin-stats-grid" id="adminStatsGrid"></div>
      <div class="grid md-grid-2 gap-6">
        <div class="section-block">
          <div class="flex items-center justify-between mb-4">
            <h2 class="section-title mb-0">Pending Driver Approvals</h2>
            <div class="flex bg-gray-100 rounded-lg p-1" id="approvalFilter">
              <button class="filter-btn active px-3 py-1 text-xs font-bold rounded"
                data-filter="pending">Pending</button>
              <button class="filter-btn px-3 py-1 text-xs font-bold rounded" data-filter="rejected">Rejected</button>
            </div>
          </div>
          <div class="approval-grid" id="approvalGrid"></div>
        </div>
        <div class="section-block">
          <h2 class="section-title">Live Activity Feed</h2>
          <div class="card p-4">
            <div id="liveActivity"></div><button class="btn btn-outline btn-full btn-sm mt-2">View All Logs</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav admin-bottom-nav">
    <a href="dashboard.html" class="active"><span data-icon="layout-dashboard" data-icon-size="24"></span></a>
    <a href="users.html"><span data-icon="users" data-icon-size="24"></span></a>
    <a href="rewards.html"><span data-icon="gift" data-icon-size="24"></span></a>
    <a href="logs.html"><span data-icon="activity" data-icon-size="24"></span></a>
    <a href="analytics.html"><span data-icon="bar-chart" data-icon-size="24"></span></a>
    <a href="settings.html"><span data-icon="settings" data-icon-size="24"></span></a>
    <a href="profile.html"><span data-icon="user" data-icon-size="24"></span></a>
  </nav>

  <script src="../../public-assets/js/script.js"></script>
  <script src="admin.js"></script>
</body>

</html>
