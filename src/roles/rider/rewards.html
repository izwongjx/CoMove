<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - Rewards</title>
  <link rel="stylesheet" href="../../public-assets/css/style.css">
  <link rel="stylesheet" href="rider.css">
</head>

<body>
  <nav class="top-nav rider-nav-bg">
    <div class="nav-inner">
      <a href="../../../index.html" class="logo">ECO<span class="text-lime">RIDE</span></a>
      <div class="nav-items">
        <a href="dashboard.html" class="nav-item"><span data-icon="home" data-icon-size="16"></span> Dashboard</a>
        <a href="find-rides.html" class="nav-item"><span data-icon="search" data-icon-size="16"></span> Find Rides</a>
        <a href="my-trips.html" class="nav-item"><span data-icon="map" data-icon-size="16"></span> My Trips</a>
        <a href="friends.html" class="nav-item"><span data-icon="users" data-icon-size="16"></span> Friends</a>
        <a href="rewards.html" class="nav-item active"><span data-icon="gift" data-icon-size="16"></span> Rewards</a>
        <a href="profile.html" class="nav-item"><span data-icon="user" data-icon-size="16"></span> Profile</a>
      </div>
      <div class="nav-actions"><a href="../../../index.html" class="nav-logout" title="Log out"><span
            data-icon="log-out" data-icon-size="20"></span></a></div>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="dash-container">
      <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
        <div class="flex items-center gap-3">
          <div class="reward-icon-box"><span data-icon="leaf" data-icon-size="22"></span></div>
          <div>
            <h1 class="page-title">Rewards Catalog</h1>
            <p class="page-subtitle">Redeem your hard-earned green points</p>
          </div>
        </div>
        <div class="points-balance-box">
          <div class="text-xs font-bold text-gray-500 uppercase">Your Balance</div>
          <div class="text-2xl font-black text-forest">1,250 pts</div>
        </div>
      </div>
      <div class="rewards-layout">
        <div class="rewards-grid" id="rewardsGrid"></div>
        <div class="redemption-history">
          <h3 class="font-bold text-lg mb-4 uppercase">Redemption History</h3>
          <div class="history-item">
            <div>
              <div class="font-bold text-sm">$5 Coffee Voucher</div>
              <div class="text-xs text-gray-500">Dec 10, 2024</div>
            </div>
            <div><span class="badge badge-gray">Used</span>
              <div class="font-bold text-sm">-500 pts</div>
            </div>
          </div>
          <div class="history-item">
            <div>
              <div class="font-bold text-sm">Free Bus Pass</div>
              <div class="text-xs text-gray-500">Nov 28, 2024</div>
            </div>
            <div><span class="badge badge-yellow">Processing</span>
              <div class="font-bold text-sm">-800 pts</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav rider-nav-bg" style="border-color:rgba(255,255,255,0.1);">
    <a href="dashboard.html"><span data-icon="home" data-icon-size="24"></span></a>
    <a href="find-rides.html"><span data-icon="search" data-icon-size="24"></span></a>
    <a href="my-trips.html"><span data-icon="map" data-icon-size="24"></span></a>
    <a href="friends.html"><span data-icon="users" data-icon-size="24"></span></a>
    <a href="rewards.html" class="active"><span data-icon="gift" data-icon-size="24"></span></a>
    <a href="profile.html"><span data-icon="user" data-icon-size="24"></span></a>
  </nav>

  <script src="../../public-assets/js/script.js"></script>
  <script src="rider.js"></script>
</body>

</html>
