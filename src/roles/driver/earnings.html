<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - Driver Earnings</title>
  <link rel="stylesheet" href="../../public-assets/css/style.css">
  <link rel="stylesheet" href="driver.css">
</head>

<body>
  <nav class="top-nav driver-nav-bg">
    <div class="nav-inner">
      <a href="../../../index.html" class="logo">ECO<span class="text-lime">RIDE</span></a>
      <div class="nav-items">
        <a href="dashboard.html" class="nav-item"><span data-icon="home" data-icon-size="16"></span> Dashboard</a>
        <a href="my-rides.html" class="nav-item"><span data-icon="car" data-icon-size="16"></span> My Rides</a>
        <a href="earnings.html" class="nav-item active"><span data-icon="dollar-sign" data-icon-size="16"></span>
          Earnings</a>
        <a href="vehicle.html" class="nav-item"><span data-icon="file-text" data-icon-size="16"></span> Vehicle</a>
        <a href="profile.html" class="nav-item"><span data-icon="user" data-icon-size="16"></span> Profile</a>
      </div>
      <div class="nav-actions"><a href="../../../index.html" class="nav-logout" title="Log out"><span
            data-icon="log-out" data-icon-size="20"></span></a></div>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="dash-container">
      <div class="flex justify-between items-end flex-wrap gap-4 mb-6">
        <div>
          <h1 class="page-title">Earnings</h1>
          <p class="page-subtitle">Track your income and trip history</p>
        </div>
        <button class="btn btn-outline"><span data-icon="download" data-icon-size="16"></span> Export CSV</button>
      </div>
      <div class="earnings-summary">
        <div class="earnings-card-main">
          <p class="stat-small-label" style="color:var(--gray-400);">Total Balance</p>
          <div class="stat-big-value text-lime">$320.50</div>
          <p class="text-sm" style="color:var(--gray-400);">Available for withdrawal</p>
        </div>
        <div class="earnings-card">
          <div class="flex items-center gap-3 mb-4">
            <div class="section-icon" style="background:rgba(196,245,71,0.2);"><span data-icon="trending-up"
                data-icon-size="18" style="color:var(--forest);"></span></div><span
              class="font-bold text-gray-500 uppercase text-sm">This Week</span>
          </div>
          <div class="text-2xl font-black mb-1">$84.50</div>
          <p class="text-sm font-bold text-green-600">+12% vs last week</p>
        </div>
        <div class="earnings-card">
          <div class="flex items-center gap-3 mb-4">
            <div class="section-icon" style="background:rgba(15,42,29,0.1);"><span data-icon="calendar"
                data-icon-size="18" style="color:var(--forest);"></span></div><span
              class="font-bold text-gray-500 uppercase text-sm">Total Trips</span>
          </div>
          <div class="text-2xl font-black mb-1">42</div>
          <p class="text-sm text-gray-500">Since Aug 2023</p>
        </div>
      </div>
      <div class="card" style="margin-top:24px;">
        <div style="padding:16px;border-bottom:1px solid var(--gray-100);">
          <h3 class="font-bold uppercase">Completed Trips</h3>
        </div>
        <div class="divide-y" id="transactionsList"></div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav driver-bottom-nav">
    <a href="dashboard.html"><span data-icon="home" data-icon-size="24"></span></a>
    <a href="my-rides.html"><span data-icon="car" data-icon-size="24"></span></a>
    <a href="earnings.html" class="active"><span data-icon="dollar-sign" data-icon-size="24"></span></a>
    <a href="vehicle.html"><span data-icon="file-text" data-icon-size="24"></span></a>
    <a href="profile.html"><span data-icon="user" data-icon-size="24"></span></a>
  </nav>

  <script src="../../public-assets/js/script.js"></script>
  <script src="driver.js"></script>
</body>

</html>
