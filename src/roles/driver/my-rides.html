<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoRide - My Offered Rides</title>
    <link rel="stylesheet" href="../../public-assets/style.css" />
    <link rel="stylesheet" href="my-rides.css" />
  </head>

  <body>
    <nav class="mainNav">
      <div class="insideNav">
        <a href="dashboard.html" class="logo">ECO<span>RIDE</span></a>
        <div class="navContents">
          <a href="dashboard.html" class="navContent"><img src="../../public-assets/icons/home.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true">
            Dashboard</a>
          <a href="my-rides.html" class="currentNav"><img src="../../public-assets/icons/car.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> My Rides</a>
          <a href="earnings.html" class="navContent"><img src="../../public-assets/icons/dollar-sign.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> Earnings</a>
          <a href="vehicle.html" class="navContent"><img src="../../public-assets/icons/file-text.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> Vehicle</a>
          <a href="profile.html" class="navContent"><img src="../../public-assets/icons/user.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> Profile</a>
        </div>
        <div class="nav-actions"><a href="../../../index.html" class="nav-logout" title="Log out"><img src="../../public-assets/icons/log-out.svg" width="20" height="20" class="icon-img" alt="" aria-hidden="true"></a></div>
      </div>
    </nav>

    <main class="dashboard-main" id="myRidesPage">
      <h1 class="page-title">My Offered Rides</h1>
      <p class="page-subtitle">
        Manage your published rides and passenger bookings.
      </p>

      <section class="my-rides-panel" aria-live="polite">
        <div class="my-rides-list" id="myRidesList"></div>
        <div class="my-rides-empty" id="myRidesEmptyState" hidden>
          <img
            src="../../public-assets/icons/car.svg"
            width="32"
            height="32"
            class="my-rides-empty-icon"
            alt=""
            aria-hidden="true"
          />
          <h2 class="my-rides-empty-title">No rides published yet</h2>
          <p class="my-rides-empty-text">
            Your upcoming and completed offered rides will appear here.
          </p>
        </div>
      </section>
    </main>

    <nav class="bottom-nav driver-bottom-nav">
      <a href="dashboard.html"
        ><img
          src="../../public-assets/icons/home.svg"
          width="24"
          height="24"
          class="icon-img"
          alt=""
          aria-hidden="true"
      /></a>
      <a href="my-rides.html" class="active"
        ><img
          src="../../public-assets/icons/car.svg"
          width="24"
          height="24"
          class="icon-img"
          alt=""
          aria-hidden="true"
      /></a>
      <a href="earnings.html"
        ><img
          src="../../public-assets/icons/dollar-sign.svg"
          width="24"
          height="24"
          class="icon-img"
          alt=""
          aria-hidden="true"
      /></a>
      <a href="vehicle.html"
        ><img
          src="../../public-assets/icons/file-text.svg"
          width="24"
          height="24"
          class="icon-img"
          alt=""
          aria-hidden="true"
      /></a>
      <a href="profile.html"
        ><img
          src="../../public-assets/icons/user.svg"
          width="24"
          height="24"
          class="icon-img"
          alt=""
          aria-hidden="true"
      /></a>
    </nav>

    <script src="../../public-assets/script.js"></script>
    <script src="my-rides.js"></script>
  </body>
</html>
