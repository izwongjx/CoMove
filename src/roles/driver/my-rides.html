<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - My Offered Rides</title>
  <link rel="stylesheet" href="../../public-assets/css/style.css">
  <link rel="stylesheet" href="driver.css">
</head>
<body>
  <nav class="top-nav driver-nav-bg">
    <div class="nav-inner">
      <a href="../../index.html" class="logo">ECO<span class="text-lime">RIDE</span></a>
      <div class="nav-items">
        <a href="dashboard.html" class="nav-item"><span data-icon="home" data-icon-size="16"></span> Dashboard</a>
        <a href="my-rides.html" class="nav-item active"><span data-icon="car" data-icon-size="16"></span> My Rides</a>
        <a href="earnings.html" class="nav-item"><span data-icon="dollar-sign" data-icon-size="16"></span> Earnings</a>
        <a href="vehicle.html" class="nav-item"><span data-icon="file-text" data-icon-size="16"></span> Vehicle</a>
        <a href="profile.html" class="nav-item"><span data-icon="user" data-icon-size="16"></span> Profile</a>
      </div>
      <div class="nav-actions"><a href="../../index.html" class="nav-logout" title="Log out"><span data-icon="log-out" data-icon-size="20"></span></a></div>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="dash-container">
      <div class="flex justify-between items-center flex-wrap gap-4 mb-6">
        <h1 class="page-title">My Offered Rides</h1>
        <button class="btn btn-primary" onclick="openModal('createTripModal')"><span data-icon="plus" data-icon-size="18"></span> Create New Ride</button>
      </div>
      <div class="offered-ride-card active-ride">
        <div class="flex justify-between flex-wrap gap-4">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-3"><span class="badge badge-lime">Scheduled</span><span class="text-gray-500 text-sm flex items-center gap-1"><span data-icon="calendar" data-icon-size="14"></span> Tomorrow, 8:30 AM</span></div>
            <div class="font-bold text-lg mb-3">University Campus â†?Downtown Mall</div>
            <div class="flex items-center gap-4 text-sm text-gray-600"><span class="flex items-center gap-1"><span data-icon="users" data-icon-size="16"></span> 2/4 Seats Booked</span><span><strong>$22.00</strong> total trip</span></div>
          </div>
          <div class="flex flex-col gap-2" style="min-width:150px;"><button class="btn btn-primary btn-sm btn-full">Manage Bookings</button><button class="btn btn-outline btn-sm btn-full">Edit Details</button></div>
        </div>
      </div>
      <div class="past-trip" style="margin-top:16px;">
        <div class="flex items-center justify-between mb-3"><div class="font-bold text-sm text-gray-500">Dec 12, 2024 &bull; 5:00 PM</div><span class="badge badge-gray">Completed</span></div>
        <div class="font-bold text-lg mb-1">North Station â†?Tech Park</div>
        <div class="text-sm text-gray-500">Earned $16.50 &bull; 3 Passengers</div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav driver-bottom-nav">
    <a href="dashboard.html"><span data-icon="home" data-icon-size="24"></span></a>
    <a href="my-rides.html" class="active"><span data-icon="car" data-icon-size="24"></span></a>
    <a href="earnings.html"><span data-icon="dollar-sign" data-icon-size="24"></span></a>
    <a href="vehicle.html"><span data-icon="file-text" data-icon-size="24"></span></a>
    <a href="profile.html"><span data-icon="user" data-icon-size="24"></span></a>
  </nav>

  <div class="modal-overlay" id="createTripModal">
    <div class="modal-content">
      <div class="modal-header"><h3 class="font-bold text-lg">Create New Ride</h3><button class="modal-close" data-close-modal="createTripModal"><span data-icon="x" data-icon-size="20"></span></button></div>
      <div class="modal-body">
        <form id="createTripForm">
          <div class="form-group"><label class="form-label">From</label><input type="text" class="form-input" name="from" placeholder="University Campus" required></div>
          <div class="form-group"><label class="form-label">To</label><input type="text" class="form-input" name="to" placeholder="Downtown Mall" required></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" name="date" required></div><div class="form-group"><label class="form-label">Time</label><input type="time" class="form-input" name="time" required></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Available Seats</label><input type="number" class="form-input" name="seats" min="1" max="6" value="4" required></div><div class="form-group"><label class="form-label">Price ($)</label><input type="number" class="form-input" name="price" step="0.50" min="1" value="20" required></div></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">Create Ride</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../../public-assets/js/script.js"></script>
  <script src="driver.js"></script>
</body>
</html>
