<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - Driver Dashboard</title>
  <link rel="stylesheet" href="../../public-assets/css/style.css">
  <link rel="stylesheet" href="driver.css">
</head>

<body>
  <nav class="top-nav driver-nav-bg">
    <div class="nav-inner">
      <a href="../../../index.html" class="logo">ECO<span class="text-lime">RIDE</span></a>
      <div class="nav-items">
        <a href="dashboard.html" class="nav-item active"><img src="../../public-assets/images/icons/home.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true">
          Dashboard</a>
        <a href="my-rides.html" class="nav-item"><img src="../../public-assets/images/icons/car.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> My Rides</a>
        <a href="earnings.html" class="nav-item"><img src="../../public-assets/images/icons/dollar-sign.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> Earnings</a>
        <a href="vehicle.html" class="nav-item"><img src="../../public-assets/images/icons/file-text.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> Vehicle</a>
        <a href="profile.html" class="nav-item"><img src="../../public-assets/images/icons/user.svg" width="16" height="16" class="icon-img" alt="" aria-hidden="true"> Profile</a>
      </div>
      <div class="nav-actions"><a href="../../../index.html" class="nav-logout" title="Log out"><img src="../../public-assets/images/icons/log-out.svg" width="20" height="20" class="icon-img" alt="" aria-hidden="true"></a></div>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="dash-container">
      <div class="flex justify-between items-start flex-wrap gap-4 mb-6">
        <div>
          <h1 class="dash-title">Dashboard <span class="lime-box">Title</span></h1>
          <p class="dash-subtitle">Dashboard Subtitle Nigga bro</p>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav driver-bottom-nav">
    <a href="dashboard.html" class="active"><img src="../../public-assets/images/icons/home.svg" width="24" height="24" class="icon-img" alt="" aria-hidden="true"></a>
    <a href="my-rides.html"><img src="../../public-assets/images/icons/car.svg" width="24" height="24" class="icon-img" alt="" aria-hidden="true"></a>
    <a href="earnings.html"><img src="../../public-assets/images/icons/dollar-sign.svg" width="24" height="24" class="icon-img" alt="" aria-hidden="true"></a>
    <a href="vehicle.html"><img src="../../public-assets/images/icons/file-text.svg" width="24" height="24" class="icon-img" alt="" aria-hidden="true"></a>
    <a href="profile.html"><img src="../../public-assets/images/icons/user.svg" width="24" height="24" class="icon-img" alt="" aria-hidden="true"></a>
  </nav>

  <div class="modal-overlay" id="createTripModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="font-bold text-lg">Create New Ride</h3><button class="modal-close"
          data-close-modal="createTripModal"><img src="../../public-assets/images/icons/x.svg" width="20" height="20" class="icon-img" alt="" aria-hidden="true"></button>
      </div>
      <div class="modal-body">
        <form id="createTripForm">
          <div class="form-group"><label class="form-label">From</label><input type="text" class="form-input"
              name="from" placeholder="University Campus" required></div>
          <div class="form-group"><label class="form-label">To</label><input type="text" class="form-input" name="to"
              placeholder="Downtown Mall" required></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input"
                name="date" required></div>
            <div class="form-group"><label class="form-label">Time</label><input type="time" class="form-input"
                name="time" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Available Seats</label><input type="number"
                class="form-input" name="seats" min="1" max="6" value="4" required></div>
            <div class="form-group"><label class="form-label">Price ($)</label><input type="number" class="form-input"
                name="price" step="0.50" min="1" value="20" required></div>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">Create Ride</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../../public-assets/js/script.js"></script>
  <script src="driver.js"></script>
</body>

</html>
