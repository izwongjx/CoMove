<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRide - Log In</title>
  <link rel="icon" type="image/svg+xml" href="../public-assets/images/icons/site-icon.svg">
  <link rel="stylesheet" href="../public-assets/css/style.css">
  <link rel="stylesheet" href="auth.css">
</head>

<body>
  <div class="auth-layout">
    <div class="auth-visual">
      <div class="auth-visual-bg">
        <img src="../public-assets/images/landing-bg.avif" alt="Mountain landscape">
        <div class="auth-visual-overlay"></div>
      </div>
      <div class="auth-visual-content">
        <h2>JOIN THE<br><span>REVOLUTION</span></h2>
        <p>Every shared ride is a vote for a cleaner planet. Be part of the solution, not the pollution.</p>
      </div>
    </div>

    <div class="auth-form-panel">
      <a href="../../index.html" class="back-link">
        <span data-icon="arrow-left" data-icon-size="16"></span>
        BACK TO HOME
      </a>

      <div class="auth-form-wrapper">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to continue your eco-friendly journey</p>
        </div>

        <form id="loginForm">
          <div class="role-toggle">
            <button type="button" class="role-btn active" data-role="rider" id="riderToggle">RIDER LOGIN</button>
            <button type="button" class="role-btn" data-role="driver" id="driverToggle">DRIVER LOGIN</button>
          </div>

          <div class="form-group">
            <label class="form-label" id="emailLabel">Student/Lecturer Email</label>
            <div class="input-wrapper">
              <span data-icon="mail" data-icon-size="20" class="input-icon"></span>
              <input type="email" class="form-input form-input-icon" id="loginEmail"
                placeholder="your.name@university.edu" required>
            </div>
          </div>

          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label">Password</label>
              <a href="#" class="forgot-link">Forgot?</a>
            </div>
            <div class="input-wrapper">
              <span data-icon="lock" data-icon-size="20" class="input-icon"></span>
              <input type="password" class="form-input form-input-icon" id="loginPassword" placeholder="••••••••"
                required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
            LOG IN AS <span id="roleText">RIDER</span>
            <span data-icon="arrow-right" data-icon-size="20"></span>
          </button>

          <div class="auth-footer-text">
            <p>Don't have an account? <a href="register.html"><strong>Sign up now</strong></a></p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../public-assets/js/script.js"></script>
  <script src="auth.js"></script>
</body>

</html>
